<!DOCTYPE html>
<html>
<head>
<title>My Question</title>
<style>
body{
background:pink;
font-family:Arial;
text-align:center;
padding-top:120px;
}

button{
padding:12px 25px;
font-size:20px;
margin:10px;
border:none;
border-radius:12px;
}

#yes{
background:lightgreen;
}

#no{
background:lightcoral;
position:absolute;
}
</style>
</head>

<body>

<h1>I have something important to ask you ❤️</h1>
<h2>Will you be my special person?</h2>

<button id="yes" onclick="alert('You made me very happy ❤️')">Yes</button>
<button id="no" onmouseover="move()">No</button>

<script>
function move(){
var x=Math.random()*window.innerWidth;
var y=Math.random()*window.innerHeight;

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}
</script>

</body>
</html>
